<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NederlandVPN Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .logo { width: 120px; border-radius: 50%; border: 2px solid #fb923c; box-shadow: 0 0 15px #fb923c; }
        h1 { color: #fb923c; margin-top: 15px; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; margin: 15px 0; border: 1px solid #334155; }
        .price { font-size: 24px; font-weight: bold; color: #38bdf8; }
        button { background: #fb923c; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .footer { font-size: 12px; color: #94a3b8; margin-top: 30px; }
    </style>
</head>
<body>
    <img src="https://i.ibb.co/v4KjYPr/vpn-logo.png" class="logo"> <h1>NederlandVPN</h1>
    <p>Выберите период подписки:</p>

    <div class="card">
        <div>1 Месяц</div>
        <div class="price">35₽</div>
        <button onclick="buy(35, 30)">Выбрать</button>
    </div>

    <div class="card">
        <div>2 Месяца</div>
        <div class="price">60₽</div>
        <button onclick="buy(60, 60)">Выбрать</button>
    </div>

    <div class="card">
        <div>3 Месяца</div>
        <div class="price">90₽</div>
        <button onclick="buy(90, 90)">Выбрать</button>
    </div>

    <p class="footer">Безопасный доступ через Нидерланды 🇳🇱</p>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function buy(price, days) {
            tg.sendData(JSON.stringify({price: price, days: days}));
            tg.close();
        }
    </script>
</body>
</html>
